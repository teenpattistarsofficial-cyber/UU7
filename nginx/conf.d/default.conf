# Bootstrap state: HTTP-only, reverse-proxying straight to the app and
# serving ACME HTTP-01 challenges from a shared webroot. This is the config
# that must be live BEFORE the first `certbot certonly` run — certbot needs
# port 80 answering for the challenge, and there's no certificate yet for
# nginx to terminate TLS with. See docker-compose.yml's top comment for the
# exact one-time bootstrap sequence; after the certificate exists, uncomment
# the HTTPS server block below and reload nginx.

server {
    listen 80;
    listen [::]:80;
    server_name uu7.io www.uu7.io;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# --- Uncomment once `certbot certonly` has issued a real certificate for
